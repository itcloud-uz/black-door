name: black_door_mobile
description: Black Door Mobile App - Neumorphic Enterprise Financial Management Client
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # Network & API
  dio: ^5.4.0
  
  # Local Storage & Encryption
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  
  # Design & Styling
  google_fonts: ^6.1.0
  
  # UI & Charts
  fl_chart: ^0.66.0
  intl: ^0.20.2
  image_picker: ^1.0.7
  
  # Security (Biometrics)
  local_auth: ^2.1.8
  
  # Real-time WebSocket Client
  laravel_echo: ^1.0.0-beta.1
  socket_io_client: ^2.0.3 # in case socket.io is used, reverb fallback

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
