name: black_door_mobile
description: Black Door Mobile App - Neumorphic Enterprise Financial Management Client
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # Network & API
  dio: ^5.4.0
  
  # Local Storage & Encryption
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  
  # Design & Styling
  google_fonts: ^6.1.0
  
  # UI & Charts
  fl_chart: ^0.66.0
  intl: ^0.20.2
  image_picker: ^1.0.7
  
  # Security (Biometrics)
  local_auth: ^2.1.8
  
  # Real-time WebSocket Client
  laravel_echo: ^1.0.0-beta.1
  socket_io_client: ^2.0.3 # in case socket.io is used, reverb fallback

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/branding/mark.png"
  adaptive_icon_background: "#EDF1F7"
  adaptive_icon_foreground: "assets/branding/mark.png"

flutter_native_splash:
  color: "#EDF1F7"
  image: "assets/branding/mark.png"
  android_12:
    color: "#EDF1F7"
    image: "assets/branding/mark.png"

flutter:
  uses-material-design: true
  assets:
    - assets/branding/logo_vertical.png
    - assets/branding/mark.png
    - assets/branding/logo_horizontal.png
