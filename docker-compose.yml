version: '3.8'

services:
  # ─── Laravel PHP-FPM Application ───────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: blackdoor-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - blackdoor-network
    healthcheck:
      test: ["CMD-SHELL", "php-fpm-healthcheck || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ─── Nginx Web Server ──────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: blackdoor-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - blackdoor-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health-check"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── PostgreSQL 16 ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: blackdoor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-blackdoor}
      POSTGRES_USER: ${DB_USERNAME:-blackdoor}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/backup:/backups
    networks:
      - blackdoor-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-blackdoor} -d ${DB_DATABASE:-blackdoor}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Redis 7 ───────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: blackdoor-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - blackdoor-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Python FastAPI Report Service ─────────────────────────────────────
  reports:
    build:
      context: .
      dockerfile: docker/python/Dockerfile
    container_name: blackdoor-reports
    restart: unless-stopped
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-blackdoor}
      DB_USERNAME: ${DB_USERNAME:-blackdoor}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REPORT_FILES_DIR: /app/generated_reports
    volumes:
      - ./services/reports:/app
      - report-files:/app/generated_reports
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - blackdoor-network
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8001/health'); assert r.status_code == 200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── Laravel Reverb WebSocket Server ───────────────────────────────────
  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: blackdoor-reverb
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - blackdoor-network
    healthcheck:
      test: ["CMD-SHELL", "php -r \"\\$c = @fsockopen('localhost', 8080); if(!\\$c) exit(1); fclose(\\$c);\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─── Laravel Scheduler ─────────────────────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: blackdoor-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan schedule:work
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    env_file:
      - .env
    depends_on:
      app:
        condition: service_healthy
    networks:
      - blackdoor-network
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep 'schedule:work' | grep -v grep || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── Laravel Queue Worker ──────────────────────────────────────────────
  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: blackdoor-queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    env_file:
      - .env
    depends_on:
      app:
        condition: service_healthy
    networks:
      - blackdoor-network
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep 'queue:work' | grep -v grep || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  blackdoor-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  report-files:
    driver: local
