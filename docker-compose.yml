version: '3.8'

services:
  # ─── Laravel PHP-FPM Application ───────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: blackdoor-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    env_file:
      - .env
    environment:
      AWS_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - blackdoor-network
    healthcheck:
      test: ["CMD-SHELL", "php-fpm-healthcheck || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ─── Nginx Web Server ──────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: blackdoor-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - blackdoor-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health-check"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── PostgreSQL 16 ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: blackdoor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-blackdoor}
      POSTGRES_USER: ${DB_USERNAME:-blackdoor}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/backup:/backups
    networks:
      - blackdoor-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-blackdoor} -d ${DB_DATABASE:-blackdoor}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Redis 7 ───────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: blackdoor-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - blackdoor-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Python FastAPI Report Service ─────────────────────────────────────
  reports:
    build:
      context: .
      dockerfile: docker/python/Dockerfile
    container_name: blackdoor-reports
    restart: unless-stopped
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-blackdoor}
      DB_USERNAME: ${DB_USERNAME:-blackdoor}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REPORT_FILES_DIR: /app/generated_reports
      AWS_ENDPOINT: http://minio:9000
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadminpassword}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_BUCKET: ${AWS_BUCKET:-blackdoor}
    volumes:
      - ./services/reports:/app
      - ./public/branding:/app/branding:ro
      - report-files:/app/generated_reports
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - blackdoor-network
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8001/health'); assert r.status_code == 200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── Laravel Reverb WebSocket Server ───────────────────────────────────
  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: blackdoor-reverb
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    env_file:
      - .env
    environment:
      AWS_ENDPOINT: http://minio:9000
    ports:
      - "8080:8080"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - blackdoor-network
    healthcheck:
      test: ["CMD-SHELL", "php -r \"\\$c = @fsockopen('localhost', 8080); if(!\\$c) exit(1); fclose(\\$c);\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─── Laravel Scheduler ─────────────────────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: blackdoor-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan schedule:work
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    env_file:
      - .env
    environment:
      AWS_ENDPOINT: http://minio:9000
    depends_on:
      app:
        condition: service_healthy
    networks:
      - blackdoor-network
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep 'schedule:work' | grep -v grep || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── Laravel Queue Worker ──────────────────────────────────────────────
  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: blackdoor-queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan horizon
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    env_file:
      - .env
    environment:
      AWS_ENDPOINT: http://minio:9000
    depends_on:
      app:
        condition: service_healthy
    networks:
      - blackdoor-network
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep 'horizon' | grep -v grep || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── MinIO Object Storage (S3-Compatible) ─────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: blackdoor-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadminpassword}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - blackdoor-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-create-bucket:
    image: minio/mc:latest
    container_name: blackdoor-minio-create-bucket
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${AWS_ACCESS_KEY_ID:-minioadmin} ${AWS_SECRET_ACCESS_KEY:-minioadminpassword};
      mc mb --ignore-existing myminio/${AWS_BUCKET:-blackdoor};
      mc anonymous set public myminio/${AWS_BUCKET:-blackdoor};
      exit 0;
      "
    networks:
      - blackdoor-network

networks:
  blackdoor-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  report-files:
    driver: local
  minio-data:
    driver: local
